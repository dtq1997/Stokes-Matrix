name: Deploy to GitHub Pages

# 双 branch 部署:
#   main    → https://dtq1997.github.io/Stokes-Matrix/         (正式版)
#   staging → https://dtq1997.github.io/Stokes-Matrix/preview/ (调试版)
#
# 任一 branch push 触发: 都 checkout main + staging (若存在), 各自 build, 合并到
# 单一 Pages artifact 上传. 这样无论先 push 哪个 branch, 另一个 branch 的 dist
# 都会从其最新 HEAD 重建, 不会被覆盖.
#
# 上线 (promote): git checkout main && git merge --ff-only staging && git push origin main.

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Check if staging branch exists
        id: check-staging
        run: |
          if git ls-remote --exit-code --heads https://github.com/${{ github.repository }} staging > /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout staging branch
        if: steps.check-staging.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging-src

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: main-src/web/package-lock.json

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1

      # ---- main branch build ----
      - name: main npm ci
        working-directory: main-src/web
        run: npm ci
      - name: main typecheck
        working-directory: main-src/web
        run: npm run typecheck
      - name: Install Playwright (browsers + deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: main-src/web
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: main-src/web
        run: npx playwright install-deps chromium
      - name: main e2e
        working-directory: main-src/web
        run: npm run test:e2e
      - name: main build
        working-directory: main-src/web
        env:
          VITE_BASE: /Stokes-Matrix/
          VITE_BACKEND_URL: https://sd-viz.dtq1997.org
        run: npm run build

      # ---- staging branch build (only if branch exists) ----
      - name: staging npm ci
        if: steps.check-staging.outputs.exists == 'true'
        working-directory: staging-src/web
        run: npm ci
      - name: staging typecheck
        if: steps.check-staging.outputs.exists == 'true'
        working-directory: staging-src/web
        run: npm run typecheck
      - name: staging e2e
        if: steps.check-staging.outputs.exists == 'true'
        working-directory: staging-src/web
        run: npm run test:e2e
      - name: staging build
        if: steps.check-staging.outputs.exists == 'true'
        working-directory: staging-src/web
        env:
          VITE_BASE: /Stokes-Matrix/preview/
          VITE_BACKEND_URL: https://sd-viz.dtq1997.org
        run: npm run build

      # ---- combine + upload ----
      - name: Combine dist
        run: |
          mkdir -p combined-dist
          cp -r main-src/web/dist/. combined-dist/
          if [ -d staging-src/web/dist ]; then
            mkdir -p combined-dist/preview
            cp -r staging-src/web/dist/. combined-dist/preview/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify:
    # 部署后 sanity check: fetch live HTML/JS/JSON, 验 SSOT marker 跟当前 source 一致.
    # 防类似 "deploy 成功但 bundle 旧版" / "viz schema 跟 dataset schema 漂移" 的悄无声息回归.
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for GH Pages propagation
        run: sleep 30
      - name: Verify live deploy SSOT markers
        run: |
          set -euo pipefail
          URL="https://dtq1997.github.io/Stokes-Matrix/"
          echo "Fetching $URL"
          HTML=$(curl -sf "$URL")
          # index.html 必须含 cache-control no-cache (防 bundle 锁旧)
          echo "$HTML" | grep -q 'Cache-Control.*no-cache' || {
            echo "::error::live index.html 缺 Cache-Control no-cache meta"; exit 1; }
          # 取 referenced JS bundle path
          JS_PATH=$(echo "$HTML" | grep -oE 'assets/index-[a-zA-Z0-9_-]+\.js' | head -1)
          [ -n "$JS_PATH" ] || { echo "::error::index.html 没引用 assets/index-*.js"; exit 1; }
          echo "JS bundle: $JS_PATH"
          JS=$(curl -sf "${URL}${JS_PATH}")
          # SSOT markers (property names that survive minification)
          for marker in A_diag_block A_off value_block m_sizes; do
            echo "$JS" | grep -q "$marker" || {
              echo "::error::live JS missing SSOT marker: $marker"; exit 1; }
          done
          echo "✓ live JS has SSOT markers"
          # Dataset schema check — 块版 (m_k>1) dataset 的 (i==j) 块内 off-diag 必须有 a/b 字段
          DS=$(curl -sf "${URL}data/n4_block.json")
          INTRA_COUNT=$(echo "$DS" | jq '[.A_off[] | select(.i == .j)] | length')
          [ "$INTRA_COUNT" -gt 0 ] || {
            echo "::error::live dataset 块版 n4_block.json 没有 (i==j) 块内 off-diag entry";
            exit 1; }
          MISSING=$(echo "$DS" | jq '[.A_off[] | select(.i == .j) | select(has("a") and has("b") | not)] | length')
          [ "$MISSING" = "0" ] || {
            echo "::error::live dataset 有 $MISSING 个 (i==j) entry 缺 a/b 字段";
            exit 1; }
          echo "✓ live dataset: $INTRA_COUNT 块内 off-diag entries 都带 a/b"
