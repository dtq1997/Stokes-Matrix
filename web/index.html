<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Stokes / Path Algebroid Visualizer — n=4 simple</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <aside id="left-panel" data-panel="left">
        <h2 class="app-title"><a href="https://github.com/dtq1997/Stokes-Matrix" target="_blank" rel="noopener">Stokes Matrices of the <span data-tex="U + A/z"></span> System</a></h2>
        <div class="dataset-wrap mono">
          <label for="dataset-select">example</label>
          <select id="dataset-select"></select>
        </div>
        <div class="n-input-wrap mono">
          <span data-tex="n ="></span>
          <input id="n-input" type="number" min="1" max="20" />
          <span class="n-comma">,</span>
          <span class="dim" id="dim-info"></span>
        </div>
        <h3>Leading term <span data-tex="U = \mathrm{diag}(u_1 I_{m_1}, \ldots, u_n I_{m_n})"></span></h3>
        <div class="state-table-wrap">
          <table id="u-table" class="state-table"></table>
        </div>
        <h3>Residue matrix <span data-tex="A"></span></h3>
        <div class="state-table-wrap">
          <table id="a-table" class="state-table"></table>
        </div>
        <div class="state-actions">
          <div id="state-stale-banner" class="stale-banner" hidden>
            <span data-tex="(U, A, m)"></span> changed — Stokes values shown are out of date
          </div>
          <div class="precision-wrap mono">
            <label for="precision-select">precision</label>
            <select id="precision-select">
              <option value="fast">fast (~5s, 4-5 digits)</option>
              <option value="low">low (~20s, 5-6 digits)</option>
              <option value="medium" selected>medium (~40s, 7-8 digits)</option>
              <option value="high">high (~100s, 10+ digits)</option>
            </select>
          </div>
          <button id="state-recompute" class="btn-primary">Compute Stokes Matrices</button>
          <button id="state-recompute-omega" class="btn-primary">Compute Central Connection Matrix</button>
          <div id="recompute-status" class="mono dim"></div>
        </div>
        <h3 id="d-heading">Direction</h3>
        <div id="d-input-wrap" class="mono">
          <span data-tex="d ="></span>
          <input id="d-input" type="text" inputmode="decimal" autocomplete="off" />
          <span data-tex="\pi"></span>
        </div>
        <div id="d-slider-wrap"></div>
      </aside>
      <div class="resize-handle" id="resize-left" data-side="left" title="Drag to resize input panel"></div>
      <main id="canvas-wrap">
        <svg id="canvas"></svg>
        <div id="hud" class="mono"></div>
        <button id="undo-btn" class="canvas-overlay-btn mono" title="Undo last action (⌘Z / Ctrl-Z)" disabled>↶</button>
        <button id="zoom-reset" class="canvas-overlay-btn mono" title="Reset zoom &amp; pan">⟲</button>
      </main>
      <div class="resize-handle" id="resize-right" data-side="right" title="Drag to resize output panel"></div>
      <aside id="right-panel" data-panel="right">
<h2>Stokes matrix</h2>
        <div id="sd-view-selector" class="sd-view-selector" role="tablist"></div>
        <div id="stokes-matrix" class="matrix-grid"></div>
        <h2>Central connection matrix</h2>
        <div id="omega-view-selector" class="sd-view-selector" role="tablist"></div>
        <div id="omega-matrix" class="matrix-grid"></div>
        <h3>Selected entry</h3>
        <div id="stokes-display"></div>
        <div id="path-info" class="mono" hidden></div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
