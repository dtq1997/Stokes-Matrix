<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stokes / Path Algebroid Visualizer — n=4 simple</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <aside id="left-panel">
        <h2>Entries <span class="dim">(i, j)</span></h2>
        <div id="entry-grid"></div>
        <h3>Direction <span class="mono">d</span></h3>
        <div id="d-slider-wrap"></div>
        <div id="d-readout" class="mono"></div>
      </aside>
      <main id="canvas-wrap">
        <svg id="canvas"></svg>
        <div id="hud" class="mono"></div>
      </main>
      <aside id="right-panel">
        <h2>(S<sub>d</sub>)<sub>ij</sub></h2>
        <div id="stokes-display"></div>
        <h3>Path <span class="dim">γ<sub>ij</sub><sup>(d)</sup></span></h3>
        <div id="path-info" class="mono"></div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
