<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stokes / Path Algebroid Visualizer — n=4 simple</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <aside id="left-panel">
        <h2>Input</h2>
        <h3>Punctures <span data-tex="U = \mathrm{diag}(u_1, \ldots, u_n)"></span></h3>
        <table id="u-table" class="state-table"></table>
        <h3>Spectral matrix <span data-tex="A \in \mathrm{Mat}_n(\mathbb{C})"></span></h3>
        <table id="a-table" class="state-table"></table>
        <div class="state-actions">
          <div id="state-stale-banner" class="stale-banner" hidden>
            <span data-tex="(U, A)"></span> 已改, Stokes 数值是旧 dataset (Phase 1.5 接后端实时重算)
          </div>
          <button id="state-reset" class="btn-secondary">Reset</button>
        </div>
        <h3>Direction <span data-tex="d"></span></h3>
        <div id="d-input-wrap" class="mono">
          <span data-tex="d ="></span>
          <input id="d-input" type="text" inputmode="decimal" autocomplete="off" />
          <span data-tex="\pi"></span>
        </div>
        <div id="d-slider-wrap"></div>
        <div id="d-readout" class="mono"></div>
        <h3>Entry <span data-tex="(i, j)"></span></h3>
        <div id="entry-grid"></div>
      </aside>
      <main id="canvas-wrap">
        <svg id="canvas"></svg>
        <div id="hud" class="mono"></div>
      </main>
      <aside id="right-panel">
        <h2>Stokes matrix <span data-tex="S_d"></span></h2>
        <div id="stokes-matrix"></div>
        <h3>Selected entry</h3>
        <div id="stokes-display"></div>
        <h3>Path info <span data-tex="\boldsymbol{\gamma}_{ij}^{(d)}"></span></h3>
        <div id="path-info" class="mono"></div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
